server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:wb_logistics}
    username: ${DB_USER:wb}
    password: ${DB_PASS:secret}
  jpa:
    hibernate:
      # validate — Hibernate проверяет схему, но не меняет её.
      # Схемой управляет Flyway (миграции в db/migration/).
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

# Наши кастомные настройки (читаются через AppProperties)
app:
  ml-service-url: ${ML_SERVICE_URL:http://localhost:8000}

logging:
  level:
    root: INFO
    com.wb.logistics: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"