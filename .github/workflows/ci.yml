name: WBLogistic CI/CD Pipeline

on:
  push:
    branches: [ "main", "release/*" ]
  pull_request:
    branches: [ "main", "release/*" ]

jobs:
  # 1. Java Backend Compilation
  backend-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x backend-java/gradlew

      - name: Build with Gradle
        run: cd backend-java && ./gradlew build -x test

  # 2. Python ML Engine Tests
  python-ml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Run Python tests
        run: pytest tests/

      - name: Lint with ruff
        continue-on-error: true
        run: |
          pip install ruff
          ruff check .

  # 3. Frontend React Build
  frontend-react:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-web/package-lock.json

      - name: Install dependencies
        run: cd frontend-web && npm ci

      - name: Build React App
        run: cd frontend-web && npm run build

  # 4. Docker Validation & Build Verification
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate Docker Compose Config
        run: docker compose config -q

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend-java
          push: false
          tags: wblogistic-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-web
          push: false
          tags: wblogistic-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build ML Engine Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.ml
          push: false
          tags: wblogistic-ml:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max