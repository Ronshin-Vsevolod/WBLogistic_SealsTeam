services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wb_logistics
      POSTGRES_USER: wb
      POSTGRES_PASSWORD: secret
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wb -d wb_logistics"]
      interval: 5s
      retries: 5

  # Python: ML-models + Decision Engine
  ml-service:
    build:
      context: .
      dockerfile: Dockerfile.ml
    ports: ["8000:8000"]
    volumes: ["./models:/app/models"]
    healthcheck:
      test:
        [
          "CMD", "python", "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  # Java: persistent + REST API
  backend:
    build: ./backend-java
    ports: ["8080:8080"]
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: wb_logistics
      DB_USER: wb
      DB_PASS: secret
      ML_SERVICE_URL: http://ml-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      ml-service:
        condition: service_started

  # New React Backend UI (Premium dashboard)
  frontend-web:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
    ports: ["3000:3000"]
    depends_on:
      - backend

volumes:
  pgdata: